{% extends "base.html" %}
{% block title %}Server Error{% endblock %}
{% block content %}
<div class="error-page">
  <div class="error-code">500</div>
  <h1>Something went wrong</h1>
  <p>We encountered an unexpected error. Please try again later.</p>
  <a href="{{ url_for('dashboard') if current_user.is_authenticated else url_for('login') }}" class="btn-primary">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2-2 2"/></svg>
    Go Home
  </a>
</div>
{% endblock %}
